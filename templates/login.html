{% extends "base.html" %}
{% block title %}Sign In — Brag Board{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-8 col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div style="font-size:3rem">🏆</div>
      <h2 class="fw-bold">Brag Board</h2>
      <p class="text-muted">Your family's hall of awesome things done.</p>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input name="username" type="text" class="form-control" autofocus autocomplete="username" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input name="password" type="password" class="form-control" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
