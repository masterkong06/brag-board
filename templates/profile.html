{% extends "base.html" %}
{% block title %}My Profile — Brag Board{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-transparent border-0 pt-3 pb-0 px-4">
        <h5 class="fw-bold mb-0">✏️ Edit Profile</h5>
      </div>
      <div class="card-body px-4 pb-4">

        <div class="d-flex align-items-center gap-3 my-3">
          <div class="avatar-chip avatar-lg" style="background:{{ session.user_color }}">
            {{ session.user_name[0].upper() }}
          </div>
          <div>
            <div class="fw-semibold">{{ session.user_name }}</div>
            <div class="text-muted small">@{{ session.username }}</div>
          </div>
        </div>

        <form method="post">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Display Name</label>
            <input name="name" type="text" class="form-control"
                   value="{{ session.user_name }}" required maxlength="40"
                   placeholder="Your name as it appears on brags">
            <div class="form-text">This is the name everyone sees on your brags and reactions.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Save Name</button>
        </form>

        <hr class="my-3">
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100 btn-sm">← Back to Board</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
